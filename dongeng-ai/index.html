```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dongeng AI Anak</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef4fa;
min-height:100vh;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:1.2fr 450px;
gap:50px;
align-items:center;
}

.hero img{
width:100%;
max-width:900px;
display:block;
}

.form-box{
background:white;
padding:35px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h1{
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
color:#64748b;
margin-bottom:25px;
line-height:1.6;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select{
width:100%;
padding:14px;
border:2px solid #e2e8f0;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.generate{
background:#f97316;
color:white;
}

.play{
background:#10b981;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

#hasil{
margin-top:25px;
padding:20px;
background:#f8fafc;
border-radius:14px;
line-height:1.8;
white-space:pre-wrap;
display:none;
max-height:500px;
overflow-y:auto;
}

.loading{
text-align:center;
padding:20px;
}

@media(max-width:1000px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<img src="https://i.imgur.com/Z2wnGBz.png">
</div>

<div class="form-box">

<h1>📚 Dongeng AI Anak</h1>

<p class="subtitle">
Buat dongeng personal dimana anak menjadi tokoh utama.
</p>

<div class="input-group">
<label>Nama Anak</label>
<input id="nama" type="text">
</div>

<div class="input-group">
<label>Usia Anak</label>
<input id="usia" type="number">
</div>

<div class="input-group">
<label>Tema Cerita</label>
<select id="tema">
<option>Petualangan</option>
<option>Persahabatan</option>
<option>Fantasi</option>
<option>Hewan</option>
<option>Islami</option>
<option>Sebelum Tidur</option>
<option>Keberanian</option>
</select>
</div>

<button class="generate" onclick="generateDongeng()">
🎙 Buat Dongeng
</button>

<button class="play" onclick="playStory()">
🔊 Dengarkan Dongeng
</button>

<button class="stop" onclick="stopStory()">
⏹ Stop
</button>

<div id="hasil"></div>

</div>

</div>

<script>

async function generateDongeng(){

const nama =
document.getElementById('nama').value;

const usia =
document.getElementById('usia').value;

const tema =
document.getElementById('tema').value;

const hasil =
document.getElementById('hasil');

hasil.style.display='block';

hasil.innerHTML='⏳ Sedang membuat dongeng...';

try{

const response = await fetch('/api/generate',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
nama,
usia,
tema
})
});

const data = await response.json();

hasil.innerText = data.cerita;

}
catch(error){

hasil.innerText =
'❌ Gagal membuat dongeng';

console.log(error);

}

}

function playStory(){

const text =
document.getElementById('hasil').innerText;

if(!text) return;

window.speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.lang='id-ID';

speech.rate=0.9;

window.speechSynthesis.speak(speech);

}

function stopStory(){

window.speechSynthesis.cancel();

}

</script>

</body>
</html>
