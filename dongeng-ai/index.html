<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dongeng AI Anak - Kreatif & Ajaib</title>
    <style>
        :root { --primary: #2563eb; --accent: #f97316; --success: #10b981; --danger: #ef4444; }
        
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; color: #334155; padding: 20px; line-height: 1.6; }
        
        .container { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 1fr 400px; gap: 40px; align-items: start; }
        
        .hero img { width: 100%; border-radius: 20px; transition: transform 0.3s ease; }
        .hero img:hover { transform: scale(1.02); }

        .form-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); margin-bottom: 15px; font-size: 1.8rem; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }

        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .generate { background: var(--accent); color: white; }
        .play { background: var(--success); color: white; }
        .stop { background: var(--danger); color: white; }

        #hasil { margin-top: 25px; padding: 20px; background: #f1f5f9; border-radius: 15px; display: none; max-height: 400px; overflow-y: auto; font-style: italic; }

        @media(max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <img src="https://i.imgur.com/Z2wnGBz.png" alt="Dongeng Anak">
    </div>
    <div class="form-box">
        <h1>✨ Dongeng AI Anak</h1>
        <p>Ciptakan cerita ajaib untuk si kecil.</p>
        <div class="input-group">
            <label>Nama Anak</label>
            <input id="nama" type="text" placeholder="Masukkan nama...">
        </div>
        <div class="input-group">
            <label>Usia</label>
            <input id="usia" type="number" placeholder="Contoh: 5">
        </div>
        <div class="input-group">
            <label>Tema Cerita</label>
            <select id="tema">
                <option>Petualangan</option>
                <option>Persahabatan</option>
                <option>Fantasi</option>
            </select>
        </div>
        <button class="generate" onclick="generateDongeng()">🎙 Buat Dongeng</button>
        <button class="play" onclick="playStory()">🔊 Dengarkan</button>
        <button class="stop" onclick="stopStory()">⏹ Berhenti</button>
        <div id="hasil"></div>
    </div>
</div>

<script>
    async function generateDongeng() {
        const nama = document.getElementById('nama').value;
        const usia = document.getElementById('usia').value;
        const tema = document.getElementById('tema').value;
        const hasil = document.getElementById('hasil');

        if(!nama || !usia) return alert("Mohon lengkapi nama dan usia!");

        hasil.style.display = 'block';
        hasil.innerText = '⏳ Sedang merangkai kata-kata ajaib...';

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nama, usia, tema })
            });
            const data = await response.json();
            hasil.innerText = data.cerita;
        } catch(error) {
            hasil.innerText = '❌ Ups, sepertinya imajinasi AI sedang istirahat. Coba lagi nanti!';
        }
    }

    function playStory() {
        const text = document.getElementById('hasil').innerText;
        if(!text || text.includes('⏳') || text.includes('❌')) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'id-ID';
        speech.rate = 0.9;
        window.speechSynthesis.speak(speech);
    }

    function stopStory() { window.speechSynthesis.cancel(); }
</script>
</body>
</html>
